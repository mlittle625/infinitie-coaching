<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#C9A84C" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Infinite Coaching" />

    <!-- SEO / Share -->
    <meta name="description" content="Becoming A Better You — your personal growth app powered by Infinite Coaching and Coach Marcus." />
    <meta property="og:title" content="Infinite Coaching – Becoming A Better You" />
    <meta property="og:description" content="Mindset. Discipline. Confidence. Your daily coaching companion." />
    <meta property="og:type" content="website" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Infinite Coaching</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0F0F0F;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript enabled to run Infinite Coaching.</noscript>
    <div id="root"></div>
  </body>
</html>
